<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar pseudo-elements</title>
    <style>
        :root {
            --primary: #efefef;
        }
        * {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }
        #container {
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .hovers {
            text-align: center;
        }
        .hovers:hover {
            color: red;
            background-color: brown;
        }

        .active:active {
            /* color: blue; */
            background-color: cyan;
        }

        .focus:focus {
            border: red solid 1px;
            border-radius: 10px;
            outline: none;
        }

        .search-box {
            margin: 100px;
            width: 200px;
            display: flex;
        }

        .search-box:focus-within {
            /* border-color: dodgerblue; */
            border: 1px solid;
        }

        .search-box > input {
            outline: none;
            border: none;

        }

        #container-2 {
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid;
        }

        /* mengambil child element pertama */
        /* #container-2 p:first-child {
            color: red;
        } */

        /* mengambil child element terakhir */
        /* #container-2 p:last-child {
            color: green;
        } */

        /* Menargetkan elemen yang menjadi anak satu-satunya pada parentnya */
        #container-2 p:only-child {
            color: blue;
        }

        /* Menargetkan tag berdasarkan type yang hanya ada satu-satunya di parentnya  */
        /* #container-2 span:only-of-type {
            color: blue;
        } */
         /* selector element anak ke n (an + b)
         * a - kelipatan 
         * n - variabel yang otomatis diisi browser 0,1,2,3....
         * b - offset/pergeseran awal 
         * contoh 
         2n + 1 
         n =  0 -> 2(0) + 1 = 1;
         n = 1 -> 2(1) + 1 = 1; 
         */
        #container-2 p:nth-child(-n+4) {
            color: red;
        }

        /* Aktif ketika user checkbox sudah tercentang */
        input:checked {
            outline: 2px solid green;
        }
        /* Ketika checkbox di centang style label yang menjadi saudara input setelahnya */
        input:checked + label {
            color: green;
            font-weight: 500;
        }

        div.myform {
            display: flex;
            align-items: center;
            gap: 2px;
        }
        /* Aktif ketika input harus di isi. dengan menambahkan attr required pada tag input */
        input.required:required {
            outline: none;
            border: 1px solid black;
            margin-top: 5px;
            border-radius: 5px;
        }
        input.required:required + label::after {
            content: "*";
            color: red;
        }
        /* Aktif ketika input mode focus saat user mengklik input */
        input.required:focus {
            border:  2px red solid;
            border-radius: 5px;
        }

        /* Aktif untuk menstyle input yang di jadikan opsional */
        input.opsional:optional {
            border: 1px green solid;
            outline: none;
            border-radius: 10px;
            text-align: center;
            color: green;
        }
        /* aktif saat input valid sesuai patern */
        input.chk:valid {
            border: 1px solid green;
        }

        input.chk {
            outline: none;
            margin: 10px;
        }
        /* Aktif ketika input tidak invalid sesuai patern*/
        input.chk:invalid {
            border: 1px solid red;
        }

        /* input.srp::placeholder {
            font-style: italic;
            color:  green;
        } */

        /* aktif saat masih ada placeholder */
        input.srp:placeholder-shown {
            font-family: Arial, Helvetica, sans-serif;
            border-color: #ccc;
            outline: none;
        }
        /* aktif saat tidak ada placeholder|user mulai mengetik  */
        input.srp:not(:placeholder-shown) {
            font-family: serif;
            border-color: red;
            outline: none;
        }
        input:read-only {
            color: blue;
            outline: none;
            border: none;
            margin: 10px;
        }
    </style>
</head>
<body>
     <!-- pseudo class interaksi berdasarkan state -->
    <div id="container">
        <p class="hovers">Hallo</p>
        <p class="active">Hello world</p>
        <input  type="text" class="focus" />
        <input type="email" class="focus-visible">

        <div class="search-box">
            <input type="text" placeholder="search something... ">
            <button onclick="alert(`hello`)">🧐</button>
        </div>
        <p>blue</p>
    </div>

    <div id="container-2">
        <p>hallo dari child1</p>
        <!-- <span>hello dari span</span> -->
        <p>hallo dari child2</p>
        <p>hallo dari child3</p>
        <p>hallo dari child4</p>
        <p>hallo dari child4</p>
        <input id="inp" />
        <input type="checkbox"> 
        <label>saya setuju dengan syarat dan ketentuan</label>
        <div class="myform">
            <input type="text" class="required" required placeholder="Nama">
            <label for="required"></label>
        </div>
        <input type="text" class="opsional" placeholder="Nama tengah (opsional)"/>

        <input type="text" pattern="[0-5]{5}" class="chk" > 

        <input type="text" class="srp" placeholder="search produk..."/>

        <input type="text" readonly value="hello world">
    </div>

    <script>
        const inp = document.getElementById("inp")

        inp.disabled = false;
    </script>
</body>
</html>
